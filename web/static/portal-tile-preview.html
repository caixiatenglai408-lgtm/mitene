<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>姫デコアイコン（TMG Portal用プレビュー）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f5f6f8;
      padding: 32px 24px;
      color: #1f2937;
    }
    h1 { font-size: 1.1rem; margin: 0 0 8px; }
    p { color: #6b7280; font-size: 0.88rem; margin: 0 0 24px; }
    .section-title {
      font-size: 0.95rem;
      font-weight: 700;
      margin: 28px 0 12px;
    }
    /* TMG Portal「アプリ一覧」風 */
    .app-list {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
    }
    .app-tile {
      width: 88px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s;
    }
    .app-tile:hover { transform: translateY(-2px); }
    .app-tile-icon {
      width: 88px;
      height: 88px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .app-tile-icon img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }
    .app-tile-name {
      margin-top: 8px;
      font-size: 0.75rem;
      color: #374151;
      line-height: 1.3;
    }
    .recent-card {
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: 360px;
      padding: 14px 18px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }
    .recent-card img { width: 40px; height: 40px; }
    .recent-card span { font-size: 0.9rem; font-weight: 600; }
    code {
      display: block;
      margin-top: 24px;
      padding: 12px;
      background: #fff;
      border-radius: 8px;
      font-size: 0.78rem;
      overflow-x: auto;
      border: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <h1>姫デコアイコン（TMG Portal 用）</h1>
  <p>Canva などと同じ「白背景・角丸・中央ロゴ」スタイルです。</p>

  <div class="section-title">アプリ一覧（クリックで管理画面を開く例）</div>
  <div class="app-list">
    <a class="app-tile" href="http://127.0.0.1:5050" target="_blank" rel="noopener">
      <div class="app-tile-icon">
        <img src="icons/deco-app-icon-1024.png" alt="姫デコ">
      </div>
      <div class="app-tile-name">姫デコ<br>ミテネ自動送信</div>
    </a>
  </div>

  <div class="section-title">最近使ったアプリ（横長カード例）</div>
  <a class="recent-card" href="http://127.0.0.1:5050" target="_blank" rel="noopener">
    <img src="icons/himedeco-portal.svg" alt="">
    <span>姫デコ ミテネ自動送信にログイン</span>
  </a>

  <p class="section-title">TMG Portal に追加するとき</p>
  <code>&lt;!-- アイコン画像: /static/icons/himedeco-portal.svg を Portal にアップロード --&gt;
URL: http://127.0.0.1:5050
名前: 姫デコ ミテネ自動送信</code>
</body>
</html>
